version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskpulse
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/taskpulse?schema=public
      - DIRECT_URL=postgresql://postgres:password@db:5432/taskpulse?schema=public
      - PORT=4000
      - API_KEY=taskpulse-secret-api-key-2024
      - DISCORD_TIMEOUT=10000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NEXT_PUBLIC_API_KEY=taskpulse-secret-api-key-2024
    depends_on:
      - backend

volumes:
  db-data:
